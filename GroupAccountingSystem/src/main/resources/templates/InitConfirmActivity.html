<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>发起项目确认</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><header><h1>发起项目确认</h1></header>
<main>
    <p class="error" th:text="${error}"></p>
    <section class="panel">
        <p>项目：<span th:text="${activity.activityName}"></span></p>
        <p>实际金额：<strong th:text="${activity.actualAmount}"></strong></p>
        <p>发起确认后，实际金额将固定，成员才能确认参与。</p>
        <form th:action="@{/activity/initConfirm}" method="post">
            <input type="hidden" name="activityID" th:value="${activity.activityID}">
            <button type="submit">发起确认</button>
            <a th:href="@{/DisplayActivity(activityID=${activity.activityID})}">返回项目详情</a>
        </form>
    </section>
    <table>
        <tr><th>成员ID</th><th>角色</th><th>确认状态</th></tr>
        <tr th:each="member : ${members}">
            <td th:text="${member.memberID}"></td>
            <td th:text="${member.role}"></td>
            <td th:text="${member.confirmAttendStatus}"></td>
        </tr>
    </table>
</main></body></html>
