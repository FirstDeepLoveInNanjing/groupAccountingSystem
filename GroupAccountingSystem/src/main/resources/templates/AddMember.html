<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>添加成员</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><header><h1>添加成员</h1></header>
<main>
    <p class="message" th:text="${message}"></p><p class="error" th:text="${error}"></p>
    <form class="panel" th:action="@{/activity/addMember}" method="post">
        <input type="hidden" name="activityID" th:value="${activity.activityID}">
        <input name="memberID" type="number" placeholder="成员用户ID" required>
        <button type="submit">添加</button>
        <a th:href="@{/DisplayActivity(activityID=${activity.activityID})}">返回项目详情</a>
    </form>
    <table>
        <tr><th>成员ID</th><th>角色</th><th>确认状态</th></tr>
        <tr th:each="member : ${members}">
            <td th:text="${member.memberID}"></td><td th:text="${member.role}"></td><td th:text="${member.confirmAttendStatus}"></td>
        </tr>
    </table>
</main></body></html>
