<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>付款完成</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><header><h1>付款完成</h1></header>
<main>
    <p class="message" th:text="${message}"></p>
    <section class="panel">
        <p>支付ID：<span th:text="${pay.payID}"></span></p>
        <p>支付状态：<span th:text="${pay.payStatus}"></span></p>
        <p>支付方式：<span th:text="${pay.payMethod}"></span></p>
        <a th:href="@{/PaymentInformation}">返回付款列表</a>
    </section>
</main></body></html>
