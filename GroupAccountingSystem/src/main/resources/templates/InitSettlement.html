<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>发起结算</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><header><h1>发起结算</h1></header>
<main>
    <p class="error" th:text="${error}"></p>
    <form class="panel" th:action="@{/settlement/init}" method="post">
        <input type="hidden" name="activityID" th:value="${activity.activityID}">
        <p>项目：<span th:text="${activity.activityName}"></span></p>
        <input name="actualAmount" type="number" step="0.01" placeholder="实际总金额" required>
        <textarea name="description" placeholder="收费说明"></textarea>
        <button type="submit">发起结算</button>
        <a th:href="@{/DisplayActivity(activityID=${activity.activityID})}">返回</a>
    </form>
</main></body></html>
