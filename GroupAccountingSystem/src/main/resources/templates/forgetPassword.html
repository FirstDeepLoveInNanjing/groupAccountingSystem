<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>密码找回</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><header><h1>密码找回</h1></header>
<main>
    <p class="error" th:text="${error}"></p>
    <form class="panel" th:action="@{/forgetPassword}" method="post">
        <input name="account" placeholder="手机号或邮箱" required>
        <input name="newPassword" type="password" placeholder="新密码" required>
        <input name="confirmPassword" type="password" placeholder="确认新密码" required>
        <button type="submit">重置密码</button>
        <a th:href="@{/signin}">返回登录</a>
    </form>
</main></body></html>
