<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>密码找回</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header><h1>密码找回</h1></header>
<main>
    <p class="message" th:text="${message}"></p>
    <p class="error" th:text="${error}"></p>

    <section class="panel">
        <h2>重置密码</h2>
        <form th:action="@{/forgetPassword}" method="post">
            <div class="form-row">
                <input name="phoneNumber" placeholder="已注册手机号" th:value="${phoneNumber}" required>
                <button type="submit" th:formaction="@{/forgetPassword/sendCode}" formnovalidate>发送验证码</button>
            </div>
            <div class="form-row">
                <input name="verifyCode" placeholder="短信验证码" required>
                <input name="newPassword" type="password" placeholder="新密码" required>
                <input name="confirmPassword" type="password" placeholder="确认新密码" required>
                <button type="submit">重置密码</button>
            </div>
            <a th:href="@{/signin}">返回登录</a>
        </form>
    </section>
</main>
</body>
</html>
