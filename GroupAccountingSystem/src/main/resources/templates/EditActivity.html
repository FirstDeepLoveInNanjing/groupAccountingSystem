<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>编辑项目</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><header><h1>编辑项目</h1></header>
<main>
    <p class="error" th:text="${error}"></p>
    <form class="panel" th:action="@{/activity/update}" method="post" th:object="${activity}">
        <input type="hidden" name="activityID" th:value="*{activityID}">
        <input name="activityName" th:value="*{activityName}" placeholder="项目名称" required>
        <input name="budget" type="number" step="0.01" th:value="*{budget}" placeholder="预算金额" required>
        <input name="actualAmount" type="number" step="0.01" th:value="*{actualAmount}" placeholder="实际总金额">
        <input name="maxMember" type="number" th:value="*{maxMember}" placeholder="最大成员数">
        <input name="confirmDeadline" type="datetime-local" placeholder="确认截止时间">
        <textarea name="description" th:text="*{description}" placeholder="项目描述"></textarea>
        <button type="submit">保存</button>
        <a th:href="@{/DisplayActivity(activityID=${activity.activityID})}">返回</a>
    </form>
</main></body></html>
