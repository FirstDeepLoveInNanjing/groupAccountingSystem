<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>查找成员</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><header><h1>查找成员</h1></header>
<main>
    <a th:href="@{/DisplayActivity(activityID=${activity.activityID})}">返回项目详情</a>
    <table>
        <tr><th>成员ID</th><th>角色</th><th>确认状态</th><th>确认时间</th></tr>
        <tr th:each="member : ${members}">
            <td th:text="${member.memberID}"></td><td th:text="${member.role}"></td><td th:text="${member.confirmAttendStatus}"></td><td th:text="${member.confirmTime}"></td>
        </tr>
    </table>
</main></body></html>
