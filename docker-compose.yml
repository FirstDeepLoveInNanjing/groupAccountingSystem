services:
  mysql:
    image: mysql:8.0
    container_name: group-accounting-mysql
    environment:
      MYSQL_ROOT_PASSWORD: zjryyds
      MYSQL_DATABASE: group_accounting
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - group-accounting-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pzjryyds"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: group-accounting-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/group_accounting
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: zjryyds
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - group-accounting-net

volumes:
  mysql-data:

networks:
  group-accounting-net:
    driver: bridge
