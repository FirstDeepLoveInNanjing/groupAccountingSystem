<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>修改密码</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><header><h1>修改密码</h1></header>
<main>
    <p class="error" th:text="${error}"></p>
    <form class="panel" th:action="@{/changePassword}" method="post">
        <input name="oldPassword" type="password" placeholder="原密码" required>
        <input name="newPassword" type="password" placeholder="新密码" required>
        <input name="confirmPassword" type="password" placeholder="确认新密码" required>
        <button type="submit">修改</button>
        <a th:href="@{/getUserInfo}">返回</a>
    </form>
</main></body></html>
