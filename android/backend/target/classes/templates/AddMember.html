<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>添加成员</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><header><h1>添加成员</h1></header>
<main>
    <p class="message" th:text="${message}"></p>
    <p class="error" th:text="${error}"></p>
    <p class="error" th:if="${activity.confirmInitiated == true}">创建者已发起确认，不能再自行添加成员</p>
    <form class="panel" th:if="${activity.confirmInitiated != true}" th:action="@{/activity/addMember}" method="post">
        <input type="hidden" name="activityID" th:value="${activity.activityID}">
        <input type="text" name="inviteCode" placeholder="成员邀请码" required>
        <button type="submit">添加</button>
        <a th:href="@{/DisplayActivity(activityID=${activity.activityID})}">返回项目详情</a>
    </form>
    <p th:if="${activity.confirmInitiated == true}"><a th:href="@{/DisplayActivity(activityID=${activity.activityID})}">返回项目详情</a></p>
    <table>
        <tr><th>成员</th><th>角色</th><th>确认状态</th></tr>
        <tr th:each="member : ${members}">
            <td>
                <span th:text="${member.memberName}"></span>
                <span style="color:#888;font-size:12px" th:text="'(ID:' + ${member.memberID} + ')'"></span>
            </td>
            <td th:text="${member.role}"></td>
            <td th:text="${member.confirmAttendStatus}"></td>
        </tr>
    </table>
</main></body></html>
